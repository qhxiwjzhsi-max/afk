<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AFK Король</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            background: #ffffff; /* Белый фон */
            color: #000000; /* Чёрный текст */
            font-family: 'Montserrat', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }
        
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #timer { 
            font-size: clamp(60px, 15vw, 150px); /* Адаптивный размер */
            font-weight: 800; 
            color: #000000; 
            font-family: 'Roboto Mono', monospace; /* Красивый шрифт для цифр */
            margin: 20px 0;
            letter-spacing: -2px;
        }
        
        input { 
            padding: 15px; 
            border-radius: 10px; 
            border: 2px solid #000; 
            background: #fff; 
            color: #000; 
            width: 250px; 
            font-size: 18px;
            text-align: center;
            font-family: 'Montserrat', sans-serif;
            outline: none;
        }

        .leaderboard-section { 
            width: 100%; 
            max-width: 600px; 
            padding: 40px 20px;
            border-top: 2px solid #eee;
        }

        h2 { text-transform: uppercase; letter-spacing: 2px; font-size: 24px; margin-bottom: 30px; }

        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 15px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        .rank { font-weight: 800; color: #888; width: 40px; }
        .name { font-weight: 500; }
        .time-val { font-family: 'Roboto Mono', monospace; font-weight: bold; text-align: right; }
    </style>
</head>
<body>

    <div class="main-container">
        <input type="text" id="username" placeholder="ВВЕДИ СВОЙ НИК" onchange="saveName()">
        <div id="timer">00:00:00</div>
        <p style="color: #888; font-size: 12px;">АВТОСОХРАНЕНИЕ ВКЛЮЧЕНО</p>
    </div>

    <div class="leaderboard-section">
        <h2>Топ-1000 лидеров</h2>
        <table id="list">
            <!-- Сюда будут добавляться игроки -->
        </table>
    </div>

<script>
    // --- ТВОИ ДАННЫЕ ИЗ SUPABASE ---
    const SUPABASE_URL = 'https://dattqgpkagclcpctpvdt.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_0SI2a5rRDlfIuW9H9k0jQw_TReMs8ve';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let seconds = 0;
    let playerName = localStorage.getItem('afk_player_name') || "";
    document.getElementById('username').value = playerName;

    function saveName() {
        playerName = document.getElementById('username').value;
        localStorage.setItem('afk_player_name', playerName);
    }

    // ЗАПУСК ТАЙМЕРА (теперь точно пойдет)
    function startTimer() {
        setInterval(() => {
            seconds++;
            const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${h}:${m}:${s}`;

            // Сохраняем в базу каждые 10 секунд, если введен ник
            if (seconds % 10 === 0 && playerName.trim() !== "") {
                syncWithDatabase();
            }
        }, 1000);
    }

    async function syncWithDatabase() {
        try {
            await supabaseClient
                .from('leaderboard')
                .upsert({ name: playerName, seconds_active: seconds }, { onConflict: 'name' });
            loadLeaderboard();
        } catch (e) {
            console.log("Ошибка базы:", e);
        }
    }

    async function loadLeaderboard() {
        const { data, error } = await supabaseClient
            .from('leaderboard')
            .select('*')
            .order('seconds_active', { ascending: false })
            .limit(1000);

        if (data) {
            const listElement = document.getElementById('list');
            listElement.innerHTML = data.map((user, index) => `
                <tr>
                    <td class="rank">${index + 1}</td>
                    <td class="name">${user.name}</td>
                    <td class="time-val">${formatTime(user.seconds_active)}</td>
                </tr>
            `).join('');
        }
    }

    function formatTime(s) {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        return `${h}ч ${m}м ${sec}с`;
    }

    // Запускаем всё при загрузке
    startTimer();
    loadLeaderboard();
</script>

</body>
</html>
