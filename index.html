<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AFK King - Leaderboard</title>
    <!-- Подключаем библиотеку Supabase и красивые шрифты -->
    <script src="https://cdn.jsdelivr.net"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            background: #ffffff; 
            color: #000000; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }
        
        .timer-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
        }

        #timer { 
            font-size: clamp(80px, 20vw, 180px); 
            font-weight: 800; 
            font-family: 'JetBrains Mono', monospace; 
            letter-spacing: -4px;
            margin: 10px 0;
        }
        
        input { 
            padding: 12px 20px; 
            border: 2px solid #000; 
            border-radius: 0; /* Стильный квадратный дизайн */
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            width: 280px;
            text-align: center;
            outline: none;
        }

        .leaderboard-section { 
            width: 100%; 
            max-width: 500px; 
            padding-bottom: 100px;
        }

        h2 { 
            text-align: center; 
            font-weight: 800; 
            text-transform: uppercase; 
            font-size: 20px;
            border-bottom: 4px solid #000;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .rank { font-weight: 800; width: 30px; }
        .name { font-weight: 400; }
        .time { text-align: right; font-family: 'JetBrains Mono', monospace; font-weight: 700; }
        
        .status { font-size: 10px; color: #aaa; margin-top: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="timer-section">
        <input type="text" id="username" placeholder="ENTER YOUR NICKNAME" onchange="updateNick()">
        <div id="timer">00:00:00</div>
        <div class="status">Live Sync Enabled</div>
    </div>

    <div class="leaderboard-section">
        <h2>Top 1000 Legends</h2>
        <table id="leaderboard">
            <!-- Data from Supabase will appear here -->
        </table>
    </div>

<script>
    // Твои ключи вставлены правильно:
    const DB_URL = 'https://dattqgpkagclcpctpvdt.supabase.co';
    const DB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRhdHRxZ3BrYWdjbGNwY3RwdmR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NzQ4MzMsImV4cCI6MjA4OTI1MDgzM30.QoPqZMDuMmmNsIFrsCyw_0g0pPqwFVAb4mtSjM3L2V4';
    
    const supabaseClient = supabase.createClient(DB_URL, DB_KEY);

    let sec = 0;
    let nick = localStorage.getItem('afk_nick') || "";
    document.getElementById('username').value = nick;

    function updateNick() {
        nick = document.getElementById('username').value;
        localStorage.setItem('afk_nick', nick);
    }

    // Таймер
    setInterval(() => {
        sec++;
        const h = Math.floor(sec / 3600).toString().padStart(2, '0');
        const m = Math.floor((sec % 3600) / 60).toString().padStart(2, '0');
        const s = (sec % 60).toString().padStart(2, '0');
        document.getElementById('timer').innerText = `${h}:${m}:${s}`;

        // Сохранение каждые 10 секунд
        if (sec % 10 === 0 && nick.trim() !== "") {
            saveToDatabase();
        }
    }, 1000);

    async function saveToDatabase() {
        try {
            await supabaseClient
                .from('leaderboard')
                .upsert({ name: nick, seconds_active: sec }, { onConflict: 'name' });
            fetchBoard();
        } catch (e) { console.error(e); }
    }

    async function fetchBoard() {
        const { data } = await supabaseClient
            .from('leaderboard')
            .select('*')
            .order('seconds_active', { ascending: false })
            .limit(1000);

        if (data) {
            document.getElementById('leaderboard').innerHTML = data.map((u, i) => `
                <tr>
                    <td class="rank">${i + 1}</td>
                    <td class="name">${u.name}</td>
                    <td class="time">${Math.floor(u.seconds_active / 60)}m ${u.seconds_active % 60}s</td>
                </tr>
            `).join('');
        }
    }

    fetchBoard();
</script>
</body>
</html>
